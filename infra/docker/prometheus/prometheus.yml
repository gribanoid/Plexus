global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: plexus-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:9090"]
        labels:
          service: plexus-server
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/metrics_token
