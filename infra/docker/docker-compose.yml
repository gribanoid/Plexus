name: plexus-infra

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: plexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: plexus
      POSTGRES_PASSWORD: plexus
      POSTGRES_DB: plexus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plexus -d plexus"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: plexus-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Meilisearch ──────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.14
    container_name: plexus-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: plexus-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Web console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── MinIO bucket bootstrap ───────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: plexus-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/plexus;
        mc anonymous set download local/plexus/public;
        exit 0;
      "

  # ── Go API server ────────────────────────────────────────────────────────────
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: plexus-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://plexus:plexus@postgres:5432/plexus?sslmode=disable
      REDIS_URL: redis://redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: plexus
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      CORS_ORIGINS: "http://localhost:3000,app://plexus"
      ENV: development
      JWT_SECRET: dev-jwt-secret-change-in-production
    ports:
      - "8080:8080"

  # ── Next.js web (dev) ─────────────────────────────────────────────────────────
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      target: dev
    container_name: plexus-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    volumes:
      - ../../apps/web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
