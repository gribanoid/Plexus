name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: plexus
          POSTGRES_PASSWORD: plexus
          POSTGRES_DB: plexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plexus -d plexus_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      meilisearch:
        image: getmeili/meilisearch:v1.12
        env:
          MEILI_ENV: development
          MEILI_NO_ANALYTICS: 'true'
        ports:
          - 7700:7700
        options: >-
          --health-cmd "wget -qO- http://localhost:7700/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://plexus:plexus@localhost:5432/plexus_test?sslmode=disable
      REDIS_URL: redis://localhost:6379
      MEILISEARCH_URL: http://localhost:7700
      JWT_SECRET: test-jwt-secret
      ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum
      - name: Go vet
        run: cd backend && go vet ./...
      - name: Go test
        run: cd backend && go test ./... -count=1 -v
      - name: Go build
        run: cd backend && go build -o /tmp/plexus-server ./cmd/server

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: ELECTRON_SKIP_BINARY_DOWNLOAD=1 npm ci
      - name: Lint
        run: npm run lint --workspaces --if-present
      - name: Typecheck
        run: npm run typecheck --workspaces --if-present
      - name: Build web
        run: npm run build --workspace=apps/web

  e2e:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: ELECTRON_SKIP_BINARY_DOWNLOAD=1 npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Build web
        run: npm run build --workspace=apps/web
      - name: Start web server
        run: npm run start --workspace=apps/web &
      - name: Wait for web server
        run: npx wait-on http://localhost:3000 --timeout 60000
      - name: Run Playwright smoke tests
        run: npm run test:e2e --workspace=apps/web
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build Android debug APK
        run: cd apps/android && ./gradlew assembleDebug --no-daemon
        env:
          PLEXUS_API_BASE_URL: http://10.0.2.2:8080/api/v1
